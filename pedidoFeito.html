<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedido Feito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body class="bg-[#efefef] overflow-hidden">

    <div class="min-h-screen flex flex-col lg:flex-row items-center justify-center lg:justify-between px-6 lg:pl-12">

        <!-- TEXTO -->
        <div class="w-full lg:w-1/2 flex flex-col items-center lg:items-start text-center lg:text-left z-10">

            <h2 class="text-green-800 font-bold text-4xl lg:text-6xl leading-tight max-w-xl">
                Seu pedido foi realizado com sucesso!
            </h2>

            <p class="text-[#9a7a7a] text-xl lg:text-2xl mt-4 mb-6">
                Obrigado pela preferência
            </p>

            <a href="./index.html">
                <button class="bg-[#5a0f14] text-white px-8 py-3 rounded-md">
                    Voltar
                </button>
            </a>
        </div>

        <!-- IMAGEM -->
        <div class="w-full lg:w-1/2 flex justify-center lg:justify-end mt-10 lg:mt-0">

            <img src="./img/logo_transparente 2.png" alt="" class="
                    w-[300px]
                    opacity-20
                    lg:opacity-20
                    lg:w-[950px]
                    lg:translate-x-60
                    absolute
                    lg:static
                ">
        </div>

    </div>
    <!-- FOOTER -->
    <footer class="border-t border-gray-200 flex-1 w-full sm:w-auto sm:pl-48 mt-2 bg-[##5a0f14]">
        <div class="mt-1 text-sm text-gray-500">
            <div>
                <!-- MENU -->
                <p class="text-lg text-center">Home | Cardápio | Doces | Bolos | Cafés</p>
            </div>

            <div class="flex items-center justify-between px-10 mt-5">
                <!-- LOGO -->
                <div class="flex items-center gap-2">
                    <img src="./img/logo_transparente 2.png" class="w-[85px]" />
                    <p class="text-sm">Formiga Coffee</p>
                </div>

                <!-- ÍCONES -->
                <div class="grid grid-cols-3 gap-4 text-[#5a0f14] text-2xl">

                    <i class="fab fa-spotify hover:scale-110 transition cursor-pointer"></i>
                    <i class="fab fa-instagram hover:scale-110 transition cursor-pointer"></i>
                    <i class="fab fa-facebook hover:scale-110 transition cursor-pointer"></i>

                    <i class="fab fa-twitter hover:scale-110 transition cursor-pointer"></i>
                    <i class="fab fa-youtube hover:scale-110 transition cursor-pointer"></i>
                    <i class="fab fa-linkedin hover:scale-110 transition cursor-pointer"></i>

                </div>

            </div>
            <!-- Texto -->
            <div class="flex justify-center mt-5">
                <p>©2026 | Todos os direitos reservados.</p>
            </div>

        </div>
    </footer>
    <script src="./src/js/menu.js"></script>
</body>

</html>
