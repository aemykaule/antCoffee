<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sua Conta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex h-screen bg-[#f4f1f1] text-gray-800">
    <div class="w-64 bg-white border-r flex flex-col p-4">

        <div class="flex items-center gap-2 mb-6">
            <div class="w-10 h-10 bg-black rounded-full"></div>
        </div>

        <nav class="flex flex-col gap-2 text-sm">
            <button class="bg-[#5a0f14] text-white p-2 rounded flex items-center gap-2">
                🏠 Início
            </button>
            <button class="p-2 flex items-center gap-2">☕ Cafés</button>
            <button class="p-2 flex items-center gap-2">🍰 Bolos</button>
            <button class="p-2 flex items-center gap-2">🍪 Doces</button>
        </nav>

        <div class="mt-6">
            <p class="text-gray-400 text-xs mb-2">Usuário</p>
            <button class="p-2 flex items-center gap-2">🙂 Sua conta</button>
            <button class="p-2 flex items-center gap-2">🛒 Seu carrinho</button>
        </div>

    </div>
<!-- CONTEÚDO -->
    <div class="flex-1 p-8 overflow-auto">

        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">

            <div class="flex items-center gap-4">
                <img src="/img/dogFone.png" class="w-14 h-14 rounded-full">
                <h1 class="text-2xl font-semibold">Dog Fone Azul</h1>
            </div>

            <button class="bg-[#5a0f14] text-white px-5 py-2 rounded-md">
                Sua Conta
            </button>
        </div>

        <!-- LINHA -->
        <div class="border-t mb-6"></div>

        <!-- CARD INFO -->
        <div class="border border-[#c9a3a3] rounded-xl p-6 mb-6 bg-white/70">

            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold">Informações Pessoais</h2>
                <b
    utton class="text-sm bg-gray-200 px-3 py-1 rounded-full">
                    ✏️ Edit
                </button>
            </div>

            <div class="grid grid-cols-2 gap-6">

                <input placeholder="Nome Completo" class="bg-gray-200 p-3 rounded-md outline-none">

                <input placeholder="Telefone" class="bg-gray-200 p-3 rounded-md outline-none">

                <input placeholder="CPF" class="bg-gray-200 p-3 rounded-md outline-none">

                <input placeholder="E-mail" class="bg-gray-200 p-3 rounded-md outline-none">

                <input placeholder="Senha" class="bg-gray-200 p-3 rounded-md outline-none col-span-2">
            </div>

            <div class="flex justify-end mt-4">
                <button class="bg-[#5a0f14] text-white px-4 py-1 rounded-full">
                    Salvar
                </button>
            </div>

        </div>

        <!-- CARD ENDEREÇO -->
        <div class="border border-[#c9a3a3] rounded-xl p-6 bg-white/70">

            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold">Endereço</h2>
                <button class="text-sm bg-gray-200 px-3 py-1 rounded-full">
                    ✏️ Edit
                </button>
            </div>

            <div class="grid grid-cols-2 gap-6">

                <select class="bg-gray-200 p-3 rounded-md">
                    <option>Estado</option>
                </select>

                <select class="bg-gray-200 p-3 rounded-md">
                    <option>Cidade</option>
                </select>

                <input placeholder="Número" class="bg-gray-200 p-3 rounded-md">

                <input placeholder="Bairro" class="bg-gray-200 p-3 rounded-md">

                <input placeholder="Endereço" class="bg-gray-200 p-3 rounded-md col-span-2">
            </div>

            <div class="flex justify-end mt-4">
                <button class="bg-[#5a0f14] text-white px-4 py-1 rounded-full">
                    Salvar
                </button>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="mt-10 text-center text-sm text-gray-500">
            <p>Home | Cardápio | Doces | Bolos | Cafés</p>
            <p class="mt-2">© 2026 | Todos os direitos reservados.</p>

        </div>

    </div>

</body>

</html>
