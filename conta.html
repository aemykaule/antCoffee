<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>Sua Conta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex h-screen bg-[#f4f1f1] text-gray-800">
    <div class="w-64 bg-white border-r flex flex-col p-4">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-10 h-10 bg-black rounded-full"></div>
        </div>

        <nav class="flex flex-col gap-2 text-sm">
            <button class="bg-[#5a0f14] text-white p-2 rounded flex items-center gap-2">
                🏠 Início
            </button>
            <button class="p-2 flex items-center gap-2">☕ Cafés</button>
            <button class="p-2 flex items-center gap-2">🍰 Bolos</button>
            <button class="p-2 flex items-center gap-2">🍪 Doces</button>
        </nav>

        <div class="mt-6">
            <p class="text-gray-400 text-xs mb-2">Usuário</p>
            <button class="p-2 flex items-center gap-2">🙂 Sua conta</button>
            <button class="p-2 flex items-center gap-2">🛒 Seu carrinho</button>
        </div>
    </div>
    <!-- CONTEÚDO -->
    <div class="flex-1 p-8 overflow-auto">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <img src="/img/dogFone.png" class="w-14 h-14 rounded-full" />
                <h1 class="text-2xl font-semibold">Dog Fone Azul</h1>
            </div>

            <button class="bg-[#5a0f14] text-white px-5 py-2 rounded-md">
                Sua Conta
            </button>
        </div>

        <!-- LINHA -->
        <div class="border-t mb-6"></div>
        <!-- CARDS -->
        <div class="p-8">
            <!-- CARD INFO -->
            <div class="border border-[#c9a3a3] rounded-xl p-6 mb-6 bg-white/70">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold">Informações Pessoais</h2>
                    <button class="text-sm bg-gray-200 px-3 py-1 rounded-full">
                        ✏️ Edit
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <input placeholder="Nome Completo" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />

                    <input placeholder="Telefone" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />

                    <input placeholder="CPF" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />

                    <input placeholder="E-mail" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />

                    <input placeholder="Senha" class="bg-gray-200 p-3 rounded-md outline-none col-span-2 w-[500px]" />
                </div>

                <div class="flex justify-end mt-4">
                    <button class="bg-[#5a0f14] text-white px-4 py-1 rounded-full">
                        Salvar
                    </button>
                </div>
            </div>

            <!-- CARD ENDEREÇO -->
            <div class="border border-[#c9a3a3] rounded-xl p-6 mb-6 bg-white/70 w-3xs">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold">Endereço</h2>
                    <button class="text-sm bg-gray-200 px-3 py-1 rounded-full">
                        ✏️ Edit
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <!-- Estado + Cidade -->
                    <div class="flex gap-4">
                        <select class="bg-gray-200 p-3 rounded-md w-[243px]">
                            <option>Estado</option>
                        </select>

                        <select class="bg-gray-200 p-3 rounded-md w-[243px]">
                            <option>Cidade</option>
                        </select>
                    </div>

                    <!-- Número -->
                    <input placeholder="Número" class="bg-gray-200 p-3 rounded-md w-[500px]" />

                    <!-- Endereço -->
                    <input placeholder="Endereço" class="bg-gray-200 p-3 rounded-md w-[500px] col-span-1" />

                    <!-- Bairro -->
                    <input placeholder="Bairro" class="bg-gray-200 p-3 rounded-md w-[500px]" />

                </div>

                <div class="flex justify-end mt-4">
                    <button class="bg-[#5a0f14] text-white px-4 py-1 rounded-full">
                        Salvar
                    </button>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="mt-10 text-center text-sm text-gray-500">
            <div>
                <p class="w-50 text-lg">Home | Cardápio | Doces | Bolos | Cafés</p>
            </div>

            <!-- ÍCONES -->
            <div class="flex gap-4 mt-4 flex flex-row-reverse">
                <!-- Spotify -->
                <svg class="w-6 h-6 hover:text-black cursor-pointer" xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 640 640">
                    <path
                        d="M320 72C183 72 72 183 72 320C72 457 183 568 320 568C457 568 568 457 568 320C568 183 457 72 320 72z" />
                </svg>

                <!-- Instagram -->
                <svg class="w-6 h-6 hover:text-black cursor-pointer" xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 640 640">
                    <path
                        d="M160 96C124.7 96 96 124.7 96 160L96 480C96 515.3 124.7 544 160 544L480 544C515.3 544 544 515.3 544 480L544 160C544 124.7 515.3 96 480 96L160 96z" />
                </svg>

                <!-- Facebook -->
                <svg class="w-6 h-6 hover:text-black cursor-pointer" xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 640 640">
                    <path
                        d="M160 96C124.7 96 96 124.7 96 160L96 480C96 515.3 124.7 544 160 544L258.2 544L258.2 398.2L205.4 398.2L205.4 320L258.2 320L258.2 286.3C258.2 199.2 297.6 158.8 383.2 158.8Z" />
                </svg>

                <div>
                    <!-- Twitter -->
                    <svg class="w-6 h-6 hover:text-black cursor-pointer" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 640 640">
                        <path d="M523.4 215.7C523.7 220.2 523.7 224.8 523.7 229.3C523.7 368 418.1 527.9 225.1 527.9Z" />
                    </svg>

                    <!-- YouTube -->
                    <svg class="w-6 h-6 hover:text-black cursor-pointer" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 640 640">
                        <path d="M581.7 188.1C575.5 164.4 556.9 145.8 533.4 139.5C490.9 128 320.1 128 320.1 128Z" />
                    </svg>

                    <!-- LinkedIn -->
                    <svg class="w-6 h-6 hover:text-black cursor-pointer" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 640 640">
                        <path d="M160 96C124.7 96 96 124.7 96 160L96 480C96 515.3 124.7 544 160 544L480 544Z" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 12.75c1.148 0 2.278.08 3.383.237 1.037.146 1.866.966 1.866 2.013 0 3.728-2.35 6.75-5.25 6.75S6.75 18.728 6.75 15c0-1.046.83-1.867 1.866-2.013A24.204 24.204 0 0 1 12 12.75Zm0 0c2.883 0 5.647.508 8.207 1.44a23.91 23.91 0 0 1-1.152 6.06M12 12.75c-2.883 0-5.647.508-8.208 1.44.125 2.104.52 4.136 1.153 6.06M12 12.75a2.25 2.25 0 0 0 2.248-2.354M12 12.75a2.25 2.25 0 0 1-2.248-2.354M12 8.25c.995 0 1.971-.08 2.922-.236.403-.066.74-.358.795-.762a3.778 3.778 0 0 0-.399-2.25M12 8.25c-.995 0-1.97-.08-2.922-.236-.402-.066-.74-.358-.795-.762a3.734 3.734 0 0 1 .4-2.253M12 8.25a2.25 2.25 0 0 0-2.248 2.146M12 8.25a2.25 2.25 0 0 1 2.248 2.146M8.683 5a6.032 6.032 0 0 1-1.155-1.002c.07-.63.27-1.222.574-1.747m.581 2.749A3.75 3.75 0 0 1 15.318 5m0 0c.427-.283.815-.62 1.155-.999a4.471 4.471 0 0 0-.575-1.752M4.921 6a24.048 24.048 0 0 0-.392 3.314c1.668.546 3.416.914 5.223 1.082M19.08 6c.205 1.08.337 2.187.392 3.314a23.882 23.882 0 0 1-5.223 1.082" />
                    </svg>
                </div>
            </div>
            <div>
                <p class="mt-6">© 2026 | Todos os direitos reservados.</p>
            </div>
        </div>
    </div>
</body>

</html>
