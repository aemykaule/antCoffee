<!doctype html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8" />
    <title>Sua Conta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
 
<body class="flex min-h-screen bg-[#f4f1f1] text-gray-800 bg-[#f4f1f1] text-gray-800">
    <div class="w-64 bg-white border-r flex flex-col p-4">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-10 h-10 bg-black rounded-full"></div>
        </div>
 
        <nav class="flex flex-col gap-2 text-sm">
            <button class="bg-[#5a0f14] text-white p-2 rounded flex items-center gap-2">
                🏠 Início
            </button>
            <button class="p-2 flex items-center gap-2">☕ Cafés</button>
            <button class="p-2 flex items-center gap-2">🍰 Bolos</button>
            <button class="p-2 flex items-center gap-2">🍪 Doces</button>
        </nav>
 
        <div class="mt-6">
            <p class="text-gray-400 text-xs mb-2">Usuário</p>
            <button class="p-2 flex items-center gap-2">🙂 Sua conta</button>
            <button class="p-2 flex items-center gap-2">🛒 Seu carrinho</button>
        </div>
    </div>
    <!-- CONTEÚDO -->
    <div class="flex-1 p-8 overflow-auto">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <img src="/img/dogFone.png" class="w-20 h-20 rounded-full" />
                <h1 class="text-2xl font-semibold text-3xl ">Dog Fone Azul</h1>
            </div>
 
            <button class="bg-[#5a0f14] text-white px-5 py-2 rounded-md">
                Sua Conta
            </button>
        </div>
 
        <!-- LINHA -->
        <div class="border-t mb-6"></div>
        <!-- CARDS -->
        <div class="p-8">
            <!-- CARD INFO PESSOAL-->
            <div class="border border-[#c9a3a3] rounded-xl p-6 mb-6 bg-white/70">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-2xl">Informações Pessoais</h2>
                <button class="flex items-center gap-2 text-sm bg-gray-200 px-3 py-1 rounded-full">
                    <span class="material-symbols-outlined">
                        edit
                    </span>
                    <p>Edit</p>
                </button>
                </div>
 
                <div class="grid grid-cols-2 gap-6">
                    <input placeholder="Nome Completo" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />
 
                    <input placeholder="Telefone" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />
 
                    <input placeholder="CPF" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />
 
                    <input placeholder="E-mail" class="bg-gray-200 p-3 rounded-md outline-none w-[500px]" />
 
                    <input placeholder="Senha" class="bg-gray-200 p-3 rounded-md outline-none col-span-2 w-[500px]" />
                </div>
 
                <div class="flex justify-end mt-4">
                    <button class="bg-[#5a0f14] text-white px-4 py-1 rounded-full">
                        Salvar
                    </button>
                </div>
            </div>
 
            <!-- CARD ENDEREÇO -->
            <div class="border border-[#c9a3a3] rounded-xl p-6 mb-6 bg-white/70 w-3xs">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-2xl">Endereço</h2>
                <button class="flex items-center gap-2 text-sm bg-gray-200 px-3 py-1 rounded-full">
                    <span class="material-symbols-outlined">
                        edit
                    </span>
                    <p>Edit</p>
                </button>
            </div>
                <div class="grid grid-cols-2 gap-6">
                    <!-- Estado + Cidade -->
                    <div class="flex gap-4 relative">
                        <select class="bg-gray-200 p-3 rounded-md w-[243px] z-10">
                            <option>Estado</option>
                            <option>Acre (AC)</option>
                            <option>Alagoas (AL)</option>
                            <option>Amapá (AP)</option>
                            <option>Amazonas (AM)</option>
                            <option>Bahia (BA)</option>
                            <option>Ceará (CE)</option>
                            <option>Espírito Santo (ES)</option>
                            <option>Goiás (GO)</option>
                            <option>Maranhão (MA)</option>
                            <option>Mato Grosso (MT)</option>
                            <option>Mato Grosso do Sul  (MS)</option>
                            <option>Minas Gerais (MG)</option>
                            <option>Pará (PA)</option>
                            <option>Paraíba (PB)</option>
                            <option>Paraná (PR)</option>
                            <option>Pernambuco (PE)</option>
                            <option>Piauí (PI)</option>
                            <option>Rio de Janeiro (RJ)</option>
                            <option>Rio Grande do Norte (RN)</option>
                            <option>Rio Grande do Sul (RS)</option>
                            <option>Rondônia (RO)</option>
                            <option>Roraima (RR)</option>
                            <option>Santa Catarina (SC)</option>
                            <option>São Paulo (SP)</option>
                            <option>Sergipe (SE)</option>
                            <option>Tocantins (TO)</option>
 
                        </select>
 
                    <input placeholder="Cidade" class="bg-gray-200 p-3 rounded-md w-[243px]" />
 
                    </div>
 
                    <!-- Número -->
                    <input placeholder="Número" class="bg-gray-200 p-3 rounded-md w-[500px]" />
 
                    <!-- Endereço -->
                    <input placeholder="Endereço" class="bg-gray-200 p-3 rounded-md w-[500px] col-span-1" />
 
                    <!-- Bairro -->
                    <input placeholder="Bairro" class="bg-gray-200 p-3 rounded-md w-[500px]" />
 
                </div>
 
                <div class="flex justify-end mt-4">
                    <button class="bg-[#5a0f14] text-white px-4 py-1 rounded-full">
                        Salvar
                    </button>
                </div>
            </div>
        </div>

<!-- FOOTER -->
<div class="mt-1 text-sm text-gray-500">
    <div>
        <!-- MENU -->
        <p class="text-lg text-center">Home | Cardápio | Doces | Bolos | Cafés</p>
    </div>

<div class="flex items-center justify-between px-10 mt-5">
    <!-- LOGO -->
    <div class="flex items-center gap-2">
        <img src="./img/logo_transparente 2.png" class="w-[85px]" />
        <p class="text-sm">Formiga Coffee</p>
    </div>

    <!-- ÍCONES -->
    <div class="grid grid-cols-3 gap-4 text-[#5a0f14] text-2xl">

        <i class="fab fa-spotify hover:scale-110 transition cursor-pointer"></i>
        <i class="fab fa-instagram hover:scale-110 transition cursor-pointer"></i>
        <i class="fab fa-facebook hover:scale-110 transition cursor-pointer"></i>

        <i class="fab fa-twitter hover:scale-110 transition cursor-pointer"></i>
        <i class="fab fa-youtube hover:scale-110 transition cursor-pointer"></i>
        <i class="fab fa-linkedin hover:scale-110 transition cursor-pointer"></i>

    </div>

</div>
    <!-- Texto -->
    <div class="flex justify-center mt-5">
        <p>©2026 | Todos os direitos reservados.</p>
    </div>

</div>


</div>
</body>

</html>
