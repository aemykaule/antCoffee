<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formiga Coffee</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-cover bg-center p-4"
  style="background-image: url('./img/cafe2.avif');">

  <div class="max-w-4xl w-full mx-auto p-6 lg:p-10 rounded-3xl flex flex-col lg:flex-row items-center justify-center 
  bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl">

    <div class="flex items-center justify-center lg:mr-20 mb-6 lg:mb-0">
      <img src="./img/imagem.png" class="w-48 lg:w-72 drop-shadow-2xl opacity-90" alt="Logo Formiga Coffee">
    </div>

    <div class="flex flex-col justify-center gap-5 text-white w-full lg:w-96 text-center lg:text-left">
      <div class="space-y-1">
        <h1 class="text-2xl lg:text-3xl font-bold tracking-tight">Formiga Coffee</h1>
        <p class="text-sm text-gray-300">Abra sua conta e sinta o aroma.</p>
      </div>

      <div class="flex flex-col gap-3">
        <input type="email" placeholder="email@dominio.com"
          class="p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-white/30 focus:bg-white/20 transition-all text-left">

        <input type="password" placeholder="crie uma senha"
          class="p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-white/30 focus:bg-white/20 transition-all text-left">
      </div>


      <a href="./index.html">
        <button
          class="w-full bg-[#5c1a1a] hover:bg-[#7a2424] p-3 rounded-xl font-semibold shadow-lg transition-all active:scale-95 mt-2 text-center block">
          Entrar
        </button>
      </a>

      <p class="text-center text-xs uppercase tracking-widest text-gray-400">ou continue com</p>

      <button
        class="bg-white/10 hover:bg-white/20 border border-white/30 text-white p-3 rounded-xl flex items-center justify-center gap-3 transition-all">
        <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" class="w-5">
        <span class="text-sm font-medium">Entrar pelo Google</span>
      </button>
      <p class="text-center text-xs uppercase tracking-widest text-gray-400">não tem uma conta?</p>
      <a href="./cadastro.html">
        <button
          class="w-full bg-white/10 hover:bg-white/20 border border-white/30 text-white p-3 rounded-xl font-semibold shadow-lg transition-all active:scale-95 mt-2 text-center block">
          <span class="text-sm font-medium">Realize o Cadastro</span>
        </button>
      </a>
    </div>

  </div>
</body>

</html>
