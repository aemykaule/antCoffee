<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="font-display bg-background-light min-h-screen flex flex-col">

    <div class="flex-1 p-4 sm:p-6 lg:p-8">

        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <button class="bg-[#5a0f14] text-white px-5 py-2 rounded-md">
                Seu Carrinho
            </button>

            <a href="index copy.html" class="text-[#5a0f14] underline">
                ← Continuar comprando
            </a>
        </div>

        <div class="border-t mb-6 border-[#c9a3a3]"></div>

        <div class="flex flex-col lg:flex-row gap-6">

            <!-- CARD PRODUTOS -->
            <div class="border border-[#c9a3a3] bg-[#D9D9D9] rounded-xl p-6 flex-1 shadow-xl">

                <!-- ITEM -->
                <div class="item flex items-start gap-4 mb-6">
                    <img src="./img/cafeGelado.png" class="w-24 h-24 rounded-lg">

                    <div class="flex flex-col gap-2">
                        <span>Café Gelado</span>
                        <p class="price" data-price="16.90">R$ 16,90</p>

                        <div class="flex gap-2">
                            <button class="decrement bg-[#5a0f14] text-white px-3">-</button>
                            <input type="text" value="1" class="qty w-12 text-center border">
                            <button class="increment bg-[#5a0f14] text-white px-3">+</button>
                        </div>

                        <button class="remove-btn text-red-600 text-sm">Remover</button>
                    </div>
                </div>

                <!-- ITEM -->
                <div class="item flex items-start gap-4 mb-6">
                    <img src="./img/boloMorango.png" class="w-24 h-24 rounded-lg">

                    <div class="flex flex-col gap-2">
                        <span>Bolo de Morango</span>
                        <p class="price" data-price="24.90">R$ 24,90</p>

                        <div class="flex gap-2">
                            <button class="decrement bg-[#5a0f14] text-white px-3">-</button>
                            <input type="text" value="1" class="qty w-12 text-center border">
                            <button class="increment bg-[#5a0f14] text-white px-3">+</button>
                        </div>

                        <button class="remove-btn text-red-600 text-sm">Remover</button>
                    </div>
                </div>

                <!-- ITEM -->
                <div class="item flex items-start gap-4 mb-6">
                    <img src="./img/boloChoco.png" class="w-24 h-24 rounded-lg">

                    <div class="flex flex-col gap-2">
                        <span>Bolo de Chocolate</span>
                        <p class="price" data-price="29.90">R$ 29,90</p>

                        <div class="flex gap-2">
                            <button class="decrement bg-[#5a0f14] text-white px-3">-</button>
                            <input type="text" value="1" class="qty w-12 text-center border">
                            <button class="increment bg-[#5a0f14] text-white px-3">+</button>
                        </div>

                        <button class="remove-btn text-red-600 text-sm">Remover</button>
                    </div>
                </div>

                <!-- TOTAL -->
                <div class="text-right mt-6">
                    <p>Subtotal: R$ <span id="subtotal">0.00</span></p>
                    <p>Frete: R$ <span id="frete">0.00</span></p>
                    <p class="font-bold">Total: R$ <span id="total">0.00</span></p>
                </div>

            </div>

            <!-- PAGAMENTO -->
            <div class="border border-[#c9a3a3] bg-[#d9d9d9] rounded-xl p-6 w-full lg:max-w-sm shadow-xl">

                <h2 class="font-semibold mb-3">Detalhes de Pagamento</h2>

                <input id="nome" placeholder="Nome" class="border p-2 rounded w-full mb-2">
                <input id="telefone" placeholder="Telefone" class="border p-2 rounded w-full mb-2">
                <input id="cep" placeholder="CEP" class="border p-2 rounded w-full mb-2">

                <button id="calcFrete" class="bg-[#5a0f14] text-white w-full py-2 rounded mb-3">
                    Calcular Frete
                </button>

                <select id="pagamento" class="border p-2 rounded w-full mb-3">
                    <option>Cartão</option>
                    <option>Pix</option>
                    <option>Boleto</option>
                </select>
                <a href="pedidoFeito.html">
                    <button class="bg-[#5a0f14] text-white w-full py-2 rounded">
                        Pagar
                    </button>
                </a>

            </div>

        </div>

    </div>

    <script>
        function atualizarTotal() {
            let subtotal = 0;

            document.querySelectorAll('.item').forEach(item => {
                const price = parseFloat(item.querySelector('.price').dataset.price);
                const qty = parseInt(item.querySelector('.qty').value);
                subtotal += price * qty;
            });

            const frete = parseFloat(document.getElementById('frete').textContent) || 0;

            document.getElementById('subtotal').textContent = subtotal.toFixed(2);
            document.getElementById('total').textContent = (subtotal + frete).toFixed(2);
        }

        // + e -
        document.querySelectorAll('.increment').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.parentElement.querySelector('.qty');
                input.value++;
                atualizarTotal();
            });
        });

        document.querySelectorAll('.decrement').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.parentElement.querySelector('.qty');
                if (input.value > 1) {
                    input.value--;
                    atualizarTotal();
                }
            });
        });

        // remover
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.closest('.item').remove();
                atualizarTotal();
            });
        });

        // frete
        document.getElementById('calcFrete').addEventListener('click', () => {
            const cep = document.getElementById('cep').value;

            if (cep.length < 8) {
                alert("CEP inválido");
                return;
            }

            const frete = 10;
            document.getElementById('frete').textContent = frete.toFixed(2);
            atualizarTotal();
        });


        atualizarTotal();
    </script>

</body>

</html>
