<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col transition-colors duration-300">
    <div class="bg-sky-50"></div>
    <!-- CONTEÚDO -->
    <div class="flex-1 p-8 overflow-auto">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <button class="bg-[#5a0f14] text-white px-5 py-2 rounded-md">
                Seu Carrinho
            </button>
        </div>

        <!-- LINHA -->
        <div class="border-t mb-6"></div>

        <!-- CARD INFO -->
        <div class="border border-[#c9a3a3] rounded-xl p-6 mb-6 bg-white/70">
            <div class="">
                <div class="flex justify-between items-center mb-4">
                    <div class="row">
                        <div class="flex items-center gap-4 mb-3">
                            <img src="./img/cafeGelado.png" alt="Café Gelado" />
                            <span class="font-medium">Café Gelado</span>
                            <p>R$ 16,90</p>
                            <div class="flex items-center space-x-2">
                                <button class="bg-bordo text-white px-3 py-1 rounded">-</button>
                                <span class="text-black font-semibold">1</span>
                                <button class="bg-bordo text-white px-3 py-1 rounded">+</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 mb-3">
                            <img src="./img/boloMorango.png" alt="Bolo de Morango" />
                            <span class="font-medium">Bolo de Morango</span>
                            <p>R$ 24,90</p>
                        </div>
                        <div class="flex items-center gap-4 mb-3">
                            <img src="./img/boloChoco.png" alt="Bolo de Chocolate" />
                            <span class="font-medium">Bolo de Chocolate</span>
                            <p>R$ 29,90</p>
                        </div>
                    </div>
                    <button class="text-sm bg-gray-200 px-3 py-1 rounded-full">
                        ✏️ Edit
                    </button>
                </div>

                <div class="flex justify-end mt-4">
                    <button class="bg-[#5a0f14] text-white px-4 py-1 rounded-full">
                        Salvar
                    </button>
                </div>
            </div>
        </div>

        <!-- CARD Pagamento -->
        <div class="border border-[#c9a3a3] rounded-xl p-6 bg-white/70">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold">Formas de Pagamento</h2>
                <button class="text-sm bg-gray-200 px-3 py-1 rounded-full">
                    ✏️ Edit
                </button>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="mt-10 text-center text-sm text-gray-500">
            <p>Home | Cardápio | Doces | Bolos | Cafés</p>
            <p class="mt-2">© 2026 | Todos os direitos reservados.</p>
        </div>
    </div>
</body>

</html>
