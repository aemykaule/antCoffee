<!Doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./dist/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <title>antCoffee</title>
</head>

<body>
  <div class="w-full min-h-screen pt-16 sm:pt-16">
    <!-- Header -->
    <header class="hidden sm:block fixed top-0 right-0 left-48 z-40 bg-white border-b border-gray-100">
      <div class="flex items-center justify-between px-6 py-4 h-16">
        <div class="flex-1">
          <div class="flex gap-2 flex-wrap">
            <div class="bg-rose-950 rounded-md px-2 flex items-center h-10">
              <button class="bg-white text-black px-3 py-1 rounded-md text-sm font-medium">
                Início
              </button>
              <button class="text-white px-3 py-2 rounded-md text-sm font-medium">
                Cardápio
              </button>
              <button class="text-white px-3 py-2 rounded-md text-sm font-medium">
                Usuário
              </button>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div class="bg-rose-950 rounded-md flex items-center">
            <input type="text" placeholder="Buscar..."
              class="bg-transparent px-3 py-2 text-sm text-gray-400 placeholder-gray-400 focus:outline-none" />
            <button type="button" class="p-2 text-gray-400 hover:text-white">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>
    <!-- Sidebar -->
    <nav id="mobile-menu"
      class="hidden sm:flex fixed inset-0 sm:inset-y-0 sm:left-0 w-full sm:w-48 h-full sm:h-screen z-[100] flex-col border-r border-gray-700 bg-white sm:bg-white/5">

      <button type="button" data-mobile-menu-close aria-controls="mobile-menu"
        class="absolute top-6 right-6 sm:hidden text-gray-500 hover:text-black p-2">
        <svg id="mobile-menu-close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          class="size-8">
          <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      <div class="flex items-center justify-center py-12 sm:px-4 sm:py-6">
        <img src="./img/logo_transparente 2.png" alt="antCoffee" class="h-16 sm:h-12 w-auto" />
      </div>

      <div class="flex-1 px-8 sm:px-4 py-6">
        <div class="space-y-6 sm:space-y-3">
          <a href="./index copy.html"
            class="rounded-md px-3 py-2 text-xl sm:text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <span class="mr-4 sm:mr-3 text-2xl sm:text-lg material-symbols-outlined"> home </span>
            Início
          </a>
          <a href="./cafes.html"
            class="rounded-md px-3 py-2 text-xl sm:text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <span class="mr-4 sm:mr-3 text-2xl sm:text-lg material-symbols-outlined">local_cafe</span>
            Cafés
          </a>
          <a href="./bolos.html"
            class="rounded-md px-3 py-2 text-xl sm:text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <span class="mr-4 sm:mr-3 text-2xl sm:text-lg material-symbols-outlined">cake</span>
            Bolos
          </a>
          <a href="./doces.html"
            class="rounded-md px-3 py-2 text-xl sm:text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <span class="mr-4 sm:mr-3 text-2xl sm:text-lg material-symbols-outlined">cookie</span>
            Doces
          </a>
        </div>
      </div>

      <div class="border-t border-gray-100 sm:border-gray-700 px-8 sm:px-4 py-8 sm:py-6 space-y-6 sm:space-y-3">
        <p class="px-2 text-gray-400 uppercase text-xs tracking-widest">Sua Conta</p>
        <a href="./conta.html"
          class="rounded-md px-3 py-2 text-xl sm:text-sm font-medium text-gray-400 hover:text-black flex items-center">
          <span class="mr-4 sm:mr-3 text-2xl sm:text-lg material-symbols-outlined"> person </span>
          Usuário
        </a>
        <a href="./carrinho.html"
          class="rounded-md px-3 py-2 text-xl sm:text-sm font-medium text-gray-400 hover:text-black flex items-center">
          <span class="mr-4 sm:mr-3 text-2xl sm:text-lg material-symbols-outlined"> shopping_cart </span>
          Carrinho
        </a>
      </div>
    </nav>

    <div
      class="sm:hidden fixed top-0 left-0 right-0 bg-white z-50 px-4 py-3 flex items-center justify-between border-b border-gray-100">
      <button type="button" data-mobile-menu-button aria-controls="mobile-menu" aria-expanded="false"
        class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400">
        <svg id="mobile-menu-open-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          class="size-6">
          <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <img src="./img/logo_transparente 2.png" alt="antCoffee" class="h-8 w-auto" />
      <button type="button" class="p-2 text-gray-400 hover:text-black">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
      </button>
    </div>

    <main class="flex-1 w-full sm:w-auto sm:pl-48">
      <div class="imagemGrande">
        <img src="./img/fundoMain.png" class="w-full object-cover">
      </div>
      <div class="destaques">
        <p
          class="text-white bg-rose-950 sm:w-64 sm:p-2 sm:mt-10 sm:ml-[60px] sm:mb-10 text-center rounded-lg sm:text-3xl p-1 text-sm w-20 ml-8 mt-5 mb-5">
          Destaques</p>
        <div class="flex-none w-full snap-center">
          <div class="relative h-[60vh] sm:h-screen w-full overflow-hidden">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1920&q=80"
              class="absolute inset-0 w-full h-full object-cover" alt="Café 1">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
              <h3 class="text-white text-4xl sm:text-7xl font-bold uppercase tracking-tighter">Cafés Especiais</h3>
            </div>
          </div>
        </div>

        <div class="flex-none w-full snap-center">
          <div class="relative h-[60vh] sm:h-screen w-full overflow-hidden">
            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=1920&q=80"
              class="absolute inset-0 w-full h-full object-cover" alt="Café 2">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
              <h3 class="text-white text-4xl sm:text-7xl font-bold uppercase tracking-tighter">Grãos Selecionados</h3>
            </div>
          </div>
        </div>

      </div>

      <button onclick="document.getElementById('carousel').scrollLeft -= window.innerWidth"
        class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 backdrop-blur-md p-4 rounded-full text-white transition-all hidden sm:block">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </button>

      <button onclick="document.getElementById('carousel').scrollLeft += window.innerWidth"
        class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 backdrop-blur-md p-4 rounded-full text-white transition-all hidden sm:block">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>
      </button>
  </div>
  </div>
  </div>
  </main>
  </div>

  <script src="./src/js/menu.js"></script>
</body>

</html>

</html>
