<!Doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./dist/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <title>antCoffee</title>
</head>

<body>
  <div class="flex w-full min-h-screen">
    <!-- Sidebar Navigation -->
    <nav id="mobile-menu"
      class="relative top-0 left-0 h-screen sm:h-screen w-64 sm:w-48 z-40 hidden sm:flex flex-col sm:flex-shrink-0 border-r border-gray-700 bg-white/5 ">

      <!-- Mobile Close Button -->
      <button type="button" data-mobile-menu-close aria-controls="mobile-menu"
        class="absolute top-4 right-4 sm:hidden text-gray-400 hover:text-white">
        <svg id="mobile-menu-close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          class="size-6">
          <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      <!-- Logo -->
      <div class="flex items-center justify-center sm:px-4 sm:py-6 lg:hidden sm:mt-0">
        <img src="./img/logo_transparente 2.png" alt="antCoffee" class="h-12 w-auto" />
      </div>

      <!-- Menu Items -->
      <div class="flex-1 px-4 py-6">
        <div class="flex items-center justify-center sm:px-4 sm:py-6 sm:hidden sm:mt-0">
          <img src="./img/logo_transparente 2.png" alt="antCoffee" class="h-12 w-auto" />
        </div>
        <div class="space-y-3 ">
          <a href="#"
            class="block rounded-md px-3 py-2 text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-5 mr-3">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
            Início
          </a>
          <a href="#"
            class="block rounded-md px-3 py-2 text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <span class="material-symbols-outlined mr-3 text-lg">local_cafe</span>
            Cafés
          </a>
          <a href="#"
            class="block rounded-md px-3 py-2 text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-5 mr-3">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 8.25v-1.5m-6 1.5v-1.5m12 9.75-1.5.75a3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0L3 16.5m15-3.379a48.474 48.474 0 0 0-6-.371c-2.032 0-4.034.126-6 .371m12 0c.39.049.777.102 1.163.16 1.07.16 1.837 1.094 1.837 2.175v5.169c0 .621-.504 1.125-1.125 1.125H4.125A1.125 1.125 0 0 1 3 20.625v-5.17c0-1.08.768-2.014 1.837-2.174A47.78 47.78 0 0 1 6 13.12M12.265 3.11a.375.375 0 1 1-.53 0L12 2.845l.265.265Zm-3 0 a.375.375 0 1 1-.53 0L9 2.845l.265.265Zm6 0 a.375.375 0 1 1-.53 0L15 2.845l.265.265Z" />
            </svg>
            Bolos
          </a>
          <a href="#"
            class="block rounded-md px-3 py-2 text-sm font-medium text-gray-400 hover:text-black flex items-center">
            <span class="material-symbols-outlined mr-3 text-lg">cookie</span>
            Doces
          </a>
        </div>
      </div>

      <!-- Bottom Menu Items -->
      <div class=" border-gray-700 px-4 py-6 space-y-3">
        <p class="px-2 text-gray-400 hover:bg-white/5">Usuário</p>
        <a href="#"
          class="block rounded-md px-3 py-2 text-sm font-medium text-gray-400 hover:text-black flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-5 mr-3">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
          Sua Conta
        </a>
        <a href="#"
          class="block rounded-md px-3 py-2 text-sm font-medium text-gray-400 hover:text-black flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-5 mr-3">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
          </svg>
          Seu Carrinho
        </a>
      </div>
    </nav>

    <!-- Mobile Header with Toggle Button -->
    <div class="sm:hidden fixed top-0 left-0 right-0 bg-white z-50 px-4 py-3 flex items-center justify-between ">
      <button type="button" data-mobile-menu-button aria-controls="mobile-menu" aria-expanded="false"
        class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400">
        <svg id="mobile-menu-open-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          class="size-6">
          <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <img src="./img/logo_transparente 2.png" alt="antCoffee" class="h-8 w-auto" />
      <button type="button" class="p-2 text-gray-400 hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
      </button>
    </div>

    <!-- Main Content -->
    <main class="pt-16 sm:pt-0 sm:ml-0 flex-1 w-full sm:w-auto">

      <!-- Mobile Category Buttons -->
      <div class="sm:hidden bg-rose-950 px-1 py-1 mr-8 ml-8 rounded-md">
        <div class="flex gap-2 flex-wrap">
          <button class="flex-1 bg-white text-black px-3 py-2 rounded-md text-sm font-medium">Início</button>
          <button class="flex-1 text-white px-3 py-2 rounded-md text-sm font-medium">Cardápio</button>
          <button class="flex-1 text-white px-3 py-2 rounded-md text-sm font-medium">Usuário</button>
        </div>
      </div>

      <!-- Desktop Header -->
      <div class="hidden sm:flex items-center justify-between px-6 py-4 h-16">
        <div class="flex-1">
          <div class="flex gap-2 flex-wrap">
            <div class="bg-rose-950 rounded-md px-2">
              <button class="flex-1 bg-white text-black px-3 py-1 rounded-md text-sm font-medium">Início</button>
              <button class="flex-1 text-white px-3 py-2 rounded-md text-sm font-medium">Cardápio</button>
              <button class="flex-1 text-white px-3 py-2 rounded-md text-sm font-medium">Usuário</button>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div class="bg-rose-950 rounded-md flex items-center">
            <input type="text" placeholder="Buscar..."
              class="bg-transparent px-3 py-2 text-sm text-gray-400 placeholder-gray-400 focus:outline-none" />
            <button type="button" class="p-2 text-gray-400 hover:text-white">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="">
        <img src="./img/fundoMain.png" alt="antCoffee" class="w-full z-0" />
        <img src="./img/imagem.png" alt="antCoffee" class="z-10 static" />
      </div>
      
    </main>
  </div>

  <script src="./src/js/menu.js"></script>
</body>

</html>
